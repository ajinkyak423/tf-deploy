name: Deploy Application

on:
  push:
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: sandbox4ak/random-string
  IMAGE_TAG: ${{ github.sha }}-${{ github.ref_name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if:  contains(github.ref, 'main') || contains(github.event.head_commit.message, 'BUILD_CONTAINER_IMAGE')
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker push ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    if:  contains(github.ref, 'main')
    steps:
      - name: SSH into EC2 and update run
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_PUBLIC_IP }}
        run: |
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          ssh -i private_key.pem -o StrictHostKeyChecking=no ubuntu@${{ env.HOST }}<< 'EOF'

            docker pull ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            docker stop flask-app || true
            docker rm flask-app || true
            docker run -d -p 8081:8081 --name flask-app --restart always ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          EOF
          rm private_key.pem